table:
  name: pokemon_v2_currency
  schema: public
array_relationships:
  - name: pokemon_v2_currencynames
    using:
      foreign_key_constraint_on:
        column: currency_id
        table:
          name: pokemon_v2_currencyname
          schema: public
  - name: pokemon_v2_itemprices
    using:
      foreign_key_constraint_on:
        column: currency_id
        table:
          name: pokemon_v2_itemprice
          schema: public
select_permissions:
  - role: anon
    permission:
      columns: '*'
      filter: {}
      limit: 100000
      allow_aggregations: true
